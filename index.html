<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; frame-src 'self' https://slither.io https://slither.com;" />
    <title>spectre.io</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
      }
      #game-container {
        width: 100%;
        height: 100%;
        border: none;

      #overlay-root {
        position: absolute;

        left: 0;

        height: 100%;

        z-index: 100;
      }
    </style>
  </head>
  <body>
    <iframe id="game-container" src="https://slither.io" allow="autoplay; fullscreen"></iframe>
    <div id="overlay-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
